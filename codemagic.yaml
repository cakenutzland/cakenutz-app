workflows:
  android-workflow:
    name: CakeNutz Android Build
    max_build_duration: 60
    environment:
      android_signing:
        - cakenutz_keystore
      vars:
        PACKAGE_NAME: "com.nutzlabs.cakenutz"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
